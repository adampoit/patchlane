name: Patchlane Promote

on:
  workflow_call:
    inputs:
      base_branch:
        description: Fork branch promoted to the tested sync commit.
        required: false
        default: main
        type: string
      sync_branch:
        description: Generated sync branch that already passed CI.
        required: false
        default: sync/integration
        type: string
      expected_sync_sha:
        description: Tested commit SHA that must still be the current sync branch head.
        required: true
        type: string
      implementation_repository:
        description: "Deprecated. Patchlane is now installed from npm at runtime."
        required: false
        default: adampoit/patchlane
        type: string
      implementation_ref:
        description: "Deprecated. Patchlane is now installed from npm at runtime."
        required: false
        default: main
        type: string
    secrets:
      token:
        description: "Token with `contents: write` permissions."
        required: false
    outputs:
      promoted_sha:
        description: Commit SHA promoted onto the base branch.
        value: ${{ jobs.promote.outputs.promoted_sha }}
      status:
        description: Final promotion status.
        value: ${{ jobs.promote.outputs.status }}

permissions:
  contents: write

jobs:
  promote:
    name: Promote tested sync branch
    runs-on: ubuntu-latest
    outputs:
      promoted_sha: ${{ steps.promote.outputs.promoted_sha }}
      status: ${{ steps.promote.outputs.status }}
    env:
      BASE_BRANCH: ${{ inputs.base_branch }}
      SYNC_BRANCH: ${{ inputs.sync_branch }}
      EXPECTED_SYNC_SHA: ${{ inputs.expected_sync_sha }}
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.token || github.token }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Promote tested sync branch
        id: promote
        run: npx patchlane@latest promote
