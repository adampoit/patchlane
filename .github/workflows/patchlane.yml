name: Patchlane Sync

on:
  workflow_call:
    inputs:
      upstream_owner:
        description: GitHub owner or organization for the upstream repository.
        required: true
        type: string
      upstream_repo:
        description: Repository name for the upstream repository.
        required: true
        type: string
      base_branch:
        description: Fork branch that receives the integration PR.
        required: false
        default: main
        type: string
      upstream_ref:
        description: Upstream branch ref to rebuild from when release_selector is empty.
        required: false
        default: main
        type: string
      release_selector:
        description: Use `latest`, `prerelease`, or a regex matched against upstream tag names. Leave blank to start from upstream_ref instead.
        required: false
        default: latest
        type: string
      sync_branch:
        description: Branch rebuilt from upstream and patch branches.
        required: false
        default: sync/integration
        type: string
      patch_refs:
        description: Newline-delimited patch branch names applied in order.
        required: true
        type: string
      pr_labels:
        description: Comma-separated labels added when the PR is created.
        required: false
        default: upstream-sync
        type: string
      pr_title:
        description: PR title template. Supports `{base_branch}`, `{upstream}`, and `{source}` tokens.
        required: false
        default: Sync integration branch from {source}
        type: string
      dry_run:
        description: Skip push and PR operations while still exercising patch application locally.
        required: false
        default: false
        type: boolean
    secrets:
      token:
        description: "Token with `contents: write` and `pull-requests: write` permissions."
        required: false
    outputs:
      sync_branch:
        description: Sync branch used for the PR when assembly succeeds.
        value: ${{ jobs.sync.outputs.sync_branch }}
      pr_number:
        description: Pull request number when a PR is created or updated.
        value: ${{ jobs.sync.outputs.pr_number }}
      pr_url:
        description: Pull request URL when a PR is created or updated.
        value: ${{ jobs.sync.outputs.pr_url }}
      failed_bookmark:
        description: First patch branch that failed to apply.
        value: ${{ jobs.sync.outputs.failed_bookmark }}
      failed_commit:
        description: Commit at the head of the failed patch branch.
        value: ${{ jobs.sync.outputs.failed_commit }}
      conflicted_paths:
        description: Newline-delimited list of conflicted paths.
        value: ${{ jobs.sync.outputs.conflicted_paths }}
      applied_refs:
        description: Newline-delimited list of refs applied before completion.
        value: ${{ jobs.sync.outputs.applied_refs }}
      status:
        description: Final workflow status.
        value: ${{ jobs.sync.outputs.status }}

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    name: Rebuild integration branch
    runs-on: ubuntu-latest
    outputs:
      sync_branch: ${{ steps.sync.outputs.sync_branch }}
      pr_number: ${{ steps.sync.outputs.pr_number }}
      pr_url: ${{ steps.sync.outputs.pr_url }}
      failed_bookmark: ${{ steps.sync.outputs.failed_bookmark }}
      failed_commit: ${{ steps.sync.outputs.failed_commit }}
      conflicted_paths: ${{ steps.sync.outputs.conflicted_paths }}
      applied_refs: ${{ steps.sync.outputs.applied_refs }}
      status: ${{ steps.sync.outputs.status }}
    env:
      GH_TOKEN: ${{ secrets.token || github.token }}
      UPSTREAM_OWNER: ${{ inputs.upstream_owner }}
      UPSTREAM_REPO: ${{ inputs.upstream_repo }}
      BASE_BRANCH: ${{ inputs.base_branch }}
      UPSTREAM_REF: ${{ inputs.upstream_ref }}
      RELEASE_SELECTOR: ${{ inputs.release_selector }}
      SYNC_BRANCH: ${{ inputs.sync_branch }}
      PATCH_REFS: ${{ inputs.patch_refs }}
      PR_LABELS: ${{ inputs.pr_labels }}
      PR_TITLE_TEMPLATE: ${{ inputs.pr_title }}
      DRY_RUN: ${{ inputs.dry_run }}
    steps:
      - name: Resolve kit source
        id: source
        env:
          WORKFLOW_REF: ${{ github.workflow_ref }}
        run: |
          set -euo pipefail
          repository="${WORKFLOW_REF%%/.github/workflows/*}"
          ref="${WORKFLOW_REF##*@}"
          echo "repository=$repository" >> "$GITHUB_OUTPUT"
          echo "ref=$ref" >> "$GITHUB_OUTPUT"

      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.token || github.token }}

      - name: Checkout Patchlane implementation
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.source.outputs.repository }}
          ref: ${{ steps.source.outputs.ref }}
          path: .patchlane
          sparse-checkout: |
            package.json
            package-lock.json
            tsconfig.json
            src

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Patchlane dependencies
        run: npm ci
        working-directory: ./.patchlane

      - name: Build Patchlane
        run: npm run build
        working-directory: ./.patchlane

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run integration sync
        id: sync
        run: node ./.patchlane/dist/integration-sync.js
