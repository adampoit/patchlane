name: Patchlane Sync

on:
  workflow_call:
    inputs:
      upstream_owner:
        description: GitHub owner or organization for the upstream repository.
        required: true
        type: string
      upstream_repo:
        description: Repository name for the upstream repository.
        required: true
        type: string
      base_branch:
        description: Fork branch promoted to the rebuilt integration result.
        required: false
        default: main
        type: string
      upstream_ref:
        description: Upstream branch ref to rebuild from when release_selector is empty.
        required: false
        default: main
        type: string
      release_selector:
        description: Use `latest`, `prerelease`, or a regex matched against upstream tag names. Leave blank to start from upstream_ref instead.
        required: false
        default: latest
        type: string
      sync_branch:
        description: Published generated branch rebuilt from upstream and patch branches.
        required: false
        default: sync/integration
        type: string
      patch_refs:
        description: Comma- or newline-delimited patch branch names applied in order. Commas are recommended for workflow_dispatch inputs.
        required: true
        type: string
      dry_run:
        description: Skip push and promotion while still exercising patch application locally.
        required: false
        default: false
        type: boolean
      implementation_repository:
        description: Repository to check out for the Patchlane implementation used at runtime.
        required: false
        default: adampoit/patchlane
        type: string
      implementation_ref:
        description: Ref to check out for the Patchlane implementation used at runtime.
        required: false
        default: main
        type: string
    outputs:
      sync_branch:
        description: Published generated branch when assembly succeeds.
        value: ${{ jobs.sync.outputs.sync_branch }}
      sync_sha:
        description: Commit SHA published to the generated sync branch.
        value: ${{ jobs.sync.outputs.sync_sha }}
      failed_bookmark:
        description: First patch branch that failed to apply.
        value: ${{ jobs.sync.outputs.failed_bookmark }}
      failed_commit:
        description: Commit at the head of the failed patch branch.
        value: ${{ jobs.sync.outputs.failed_commit }}
      conflicted_paths:
        description: Newline-delimited list of conflicted paths.
        value: ${{ jobs.sync.outputs.conflicted_paths }}
      applied_refs:
        description: Newline-delimited list of refs applied before completion.
        value: ${{ jobs.sync.outputs.applied_refs }}
      status:
        description: Final workflow status.
        value: ${{ jobs.sync.outputs.status }}

permissions:
  contents: write

jobs:
  sync:
    name: Rebuild integration branch
    runs-on: ubuntu-latest
    outputs:
      sync_branch: ${{ steps.sync.outputs.sync_branch }}
      sync_sha: ${{ steps.sync.outputs.sync_sha }}
      failed_bookmark: ${{ steps.sync.outputs.failed_bookmark }}
      failed_commit: ${{ steps.sync.outputs.failed_commit }}
      conflicted_paths: ${{ steps.sync.outputs.conflicted_paths }}
      applied_refs: ${{ steps.sync.outputs.applied_refs }}
      status: ${{ steps.sync.outputs.status }}
    env:
      GH_TOKEN: ${{ github.token }}
      UPSTREAM_OWNER: ${{ inputs.upstream_owner }}
      UPSTREAM_REPO: ${{ inputs.upstream_repo }}
      BASE_BRANCH: ${{ inputs.base_branch }}
      UPSTREAM_REF: ${{ inputs.upstream_ref }}
      RELEASE_SELECTOR: ${{ inputs.release_selector }}
      SYNC_BRANCH: ${{ inputs.sync_branch }}
      PATCH_REFS: ${{ inputs.patch_refs }}
      DRY_RUN: ${{ inputs.dry_run }}
      IMPLEMENTATION_REPOSITORY: ${{ inputs.implementation_repository }}
      IMPLEMENTATION_REF: ${{ inputs.implementation_ref }}
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Checkout Patchlane implementation
        uses: actions/checkout@v4
        with:
          repository: ${{ env.IMPLEMENTATION_REPOSITORY }}
          ref: ${{ env.IMPLEMENTATION_REF }}
          path: .patchlane
          sparse-checkout-cone-mode: false
          sparse-checkout: |
            package.json
            package-lock.json
            tsconfig.json
            src

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Patchlane dependencies
        run: npm ci
        working-directory: ./.patchlane

      - name: Build Patchlane
        run: npm run build
        working-directory: ./.patchlane

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run integration sync
        id: sync
        run: node ./.patchlane/dist/integration-sync.js
